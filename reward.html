<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해박탐험단 특별 선물</title>
    <style>
        body { font-family: 'Gowun Dodum', sans-serif; text-align: center; background-color: #f0f8ff; padding: 20px; color: #333; }
        h1 { color: #0277bd; font-size: 1.5rem; margin-bottom: 5px; }
        p { font-size: 0.9rem; margin-bottom: 20px; background: #ffe082; display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .image-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        img { width: 80%; max-width: 300px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .instruction { font-weight: bold; color: #d32f2f; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🎉 위대한 탐험가, 축하합니다!</h1>
    <p>실물 교재 소진 기념(?) 한정판 디지털 굿즈</p>
    
    <div class="instruction">👇 마음에 드는 이미지를 '꾹~' 눌러서 저장하세요! 👇</div>

    <div class="image-container" style="margin-top: 20px;">
        <div>
            <img src="./images/wallpaper_pixel.png" alt="픽셀아트 항해">
        </div>
        <div>
            <img src="./images/wallpaper_haenyeo.png" alt="해녀 해버미">
        </div>
        <div>
            <img src="./images/wallpaper_sailing.png" alt="항해">
        </div>
    </div>

    <div style="margin-top: 30px; font-size: 0.8rem; color: #666;">
        국립해양박물관 어린이날 기념 프로그램
    </div>
</body>
</html>
